name: Go

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  schedule:
    - cron: '17 3 1 * *'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        GO_VERSION:
          - "1.25.x"
          - "1.26.x"
          - "gotip"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Go ${{ matrix.GO_VERSION }}
      uses: actions/setup-go@v6
      with:
        # setup-go can't install tip itself, so bootstrap with stable
        go-version: "${{ matrix.GO_VERSION == 'gotip' && 'stable' || matrix.GO_VERSION }}"

    - name: Set up gotip
      if: matrix.GO_VERSION == 'gotip'
      run: |
        go install golang.org/dl/gotip@latest
        gotip download
        echo "GOROOT=$(gotip env GOROOT)" >> "$GITHUB_ENV"
        echo "$(gotip env GOROOT)/bin" >> "$GITHUB_PATH"

    - run: go version

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

  govulncheck:
    strategy:
      matrix:
        GO_VERSION:
          # We only need to test vulns on one version
          - "1.26.x"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go ${{ matrix.GO_VERSION }}
        uses: actions/setup-go@v6
        with:
          # When Go produces a security release, we want govulncheck to run
          # against the most recently released Go version.
          check-latest: true
          go-version: "${{ matrix.GO_VERSION }}"

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
